<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>지존짱짱 V8 - 소셜 코딩 플랫폼</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin:0; background:#f0f2f5; height:100vh; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        .hidden { display:none !important; }
        .play-stage { width: 640px; height: 360px; background: white; border: 4px solid #334155; position: relative; overflow: hidden; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .sprite { position: absolute; transition: all 0.2s linear; transform: translate(-50%, -50%); cursor: pointer; user-select: none; }
    </style>
</head>
<body class="flex flex-col">

<nav id="navbar" class="h-16 bg-white border-b px-8 flex justify-between items-center z-50">
    <h1 onclick="showMain()" class="text-2xl font-black text-blue-600 cursor-pointer italic">ZIZON ZZANG</h1>
    <div id="navMenu" class="flex items-center space-x-6 font-bold text-slate-600">
        <button onclick="showMain()">메인</button>
        <button onclick="openEditor()">만들기</button>
        <div class="bg-slate-100 px-4 py-2 rounded-full text-sm">
            <span id="userNameDisplay">로그인 필요</span>
        </div>
    </div>
</nav>

<div id="mainScreen" class="flex-grow overflow-y-auto p-10 hidden">
    <div class="max-w-6xl mx-auto">
        <h2 class="text-3xl font-black mb-8 text-slate-800">공개된 작품들 ✨</h2>
        <div id="projectGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </div>
</div>

<div id="projectPage" class="flex-grow flex flex-col items-center justify-center p-6 hidden bg-slate-50 overflow-y-auto">
    <div class="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 flex flex-col items-center">
            <div id="playStage" class="play-stage mb-4"></div>
            <div class="flex space-x-3 w-full justify-center">
                <button onclick="runProject()" class="bg-green-500 text-white px-10 py-3 rounded-2xl font-black shadow-lg">▶ 시작하기</button>
                <button onclick="stopProject()" class="bg-red-500 text-white px-10 py-3 rounded-2xl font-black shadow-lg">■ 정지하기</button>
            </div>
        </div>
        <div class="bg-white p-8 rounded-[30px] shadow-sm border border-slate-200">
            <h2 id="viewTitle" class="text-3xl font-black mb-4 text-slate-800">작품 제목</h2>
            <div onclick="goToUserPage()" class="flex items-center space-x-3 mb-6 p-3 bg-blue-50 rounded-2xl cursor-pointer hover:bg-blue-100 transition">
                <span class="text-2xl">👤</span>
                <div>
                    <div class="text-xs text-blue-500 font-bold">제작자</div>
                    <div id="viewAuthor" class="font-black text-slate-700">작성자 닉네임</div>
                </div>
            </div>
            <div class="flex justify-around mb-8 border-y py-4">
                <div class="text-center">
                    <div class="text-slate-400 text-xs font-bold">조회수</div>
                    <div id="viewCount" class="text-xl font-black">0</div>
                </div>
                <div class="text-center">
                    <div class="text-slate-400 text-xs font-bold">좋아요</div>
                    <div id="likeCount" class="text-xl font-black">0</div>
                </div>
            </div>
            <button onclick="handleLike()" class="w-full bg-pink-50 text-pink-500 py-4 rounded-2xl font-black mb-4 hover:bg-pink-100 transition text-xl">❤️ 좋아요 꾹!</button>
            <button id="editBtn" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-black hidden">🛠️ 코드 보기/수정</button>
        </div>
    </div>
</div>

<div id="editorScreen" class="flex-grow flex hidden">
    <div id="blocklyArea" class="flex-grow relative">
        <div id="blocklyDiv" style="position: absolute; top:0; left:0; right:0; bottom:0;"></div>
    </div>
    <div class="w-80 bg-white border-l p-6 flex flex-col shadow-xl">
        <input id="editTitle" class="text-2xl font-black border-b-2 mb-6 outline-none focus:border-blue-500" value="새 작품">
        <div class="flex-grow">
            <h3 class="font-bold text-slate-400 mb-4 uppercase text-xs tracking-widest">오브젝트</h3>
            <div id="objectList" class="grid grid-cols-3 gap-2"></div>
        </div>
        <button onclick="saveProject()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">공개하기</button>
    </div>
</div>

<xml id="toolbox" style="display:none">
    <category name="동작" colour="230"><block type="move_x"></block></category>
</xml>

<script>
// --- 파이어베이스 설정 (본인 키로 교체 필요) ---
const firebaseConfig = { 
    apiKey: "YOUR_KEY", 
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- 전역 변수 ---
let currentUser = { id: "test_id", nickname: "지존코더" }; // 임시 유저
let currentProject = null;
let objects = [];
let initialPos = []; // 정지 시 되돌아갈 위치 저장용
let workspace;

// --- 화면 전환 로직 ---
function hideAll() {
    ['mainScreen', 'projectPage', 'editorScreen'].forEach(id => document.getElementById(id).classList.add('hidden'));
}

function showMain() {
    hideAll(); document.getElementById('mainScreen').classList.remove('hidden');
    db.ref('projects').on('value', (snap) => {
        const grid = document.getElementById('projectGrid');
        grid.innerHTML = '';
        snap.forEach(child => {
            const p = child.val(); p.id = child.key;
            const card = document.createElement('div');
            card.className = "bg-white p-5 rounded-[25px] shadow-sm hover:shadow-xl cursor-pointer transition transform hover:-translate-y-1 border border-slate-100";
            card.innerHTML = `
                <div class="h-32 bg-slate-50 rounded-2xl mb-4 flex items-center justify-center text-5xl">${p.objects[0].emoji}</div>
                <div class="font-black text-slate-800 truncate">${p.name}</div>
                <div class="text-xs text-slate-400 mt-1 font-bold">👤 ${p.authorName}</div>
                <div class="flex mt-3 space-x-3 text-[10px] font-black text-blue-400 uppercase">
                    <span>👀 ${p.views || 0}</span> <span>❤️ ${p.likes || 0}</span>
                </div>
            `;
            card.onclick = () => openProjectPage(p);
            grid.appendChild(card);
        });
    });
}

// --- [작품 페이지] 엔트리처럼 구현 ---
function openProjectPage(p) {
    hideAll(); document.getElementById('projectPage').classList.remove('hidden');
    currentProject = p;
    objects = JSON.parse(JSON.stringify(p.objects)); // 복사본 생성
    
    document.getElementById('viewTitle').innerText = p.name;
    document.getElementById('viewAuthor').innerText = p.authorName;
    document.getElementById('viewCount').innerText = (p.views || 0) + 1;
    document.getElementById('viewLikes').innerText = p.likes || 0;
    
    // 조회수 증가
    db.ref('projects/' + p.id + '/views').set((p.views || 0) + 1);
    
    // 수정
