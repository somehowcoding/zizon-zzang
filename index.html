<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>지존짱짱 코딩 V6 (실시간 버전)</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    </head>
<body>
<script>
// 1. Firebase 설정 (네 프로젝트 값으로 꼭 바꿔줘!)
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
};

// 2. Firebase 초기화
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* --- [실시간 채팅 핵심 로직] --- */
function sendChat() {
    const inp = document.getElementById('chatInput');
    if(!inp.value.trim()) return;

    // localStorage 대신 Firebase 데이터베이스에 저장!
    db.ref('chats').push({
        user: currentUser.nickname,
        msg: inp.value,
        time: Date.now()
    });
    inp.value = '';
}

// Firebase에서 데이터가 바뀌면(새 메시지가 오면) 자동으로 실행됨
db.ref('chats').limitToLast(20).on('value', (snapshot) => {
    const msgs = snapshot.val();
    const box = document.getElementById('chatMessages');
    box.innerHTML = '';
    if(msgs) {
        Object.values(msgs).forEach(m => {
            box.innerHTML += `
                <div class="${m.user === currentUser.nickname ? 'text-right' : 'text-left'}">
                    <div class="text-[10px] text-slate-400 font-bold">${m.user}</div>
                    <div class="inline-block px-4 py-2 rounded-2xl bg-white shadow-sm mb-2">${m.msg}</div>
                </div>`;
        });
    }
    box.scrollTop = box.scrollHeight;
});

/* --- [실시간 작품 공유 로직] --- */
function saveProject() {
    let name = prompt("작품 이름?", "새 작품");
    if(!name) return;

    // Firebase에 저장 (이제 전 세계 사람들이 다 볼 수 있음!)
    db.ref('all_projects').push({
        name: name,
        objects: objects,
        authorName: currentUser.nickname,
        authorId: currentUser.id,
        isPublic: true
    });
    alert("서버에 저장 완료! 모두가 볼 수 있습니다.");
}

// 메인 화면에서 실시간으로 작품 목록 불러오기
db.ref('all_projects').on('value', (snapshot) => {
    const list = [];
    snapshot.forEach(child => { list.push(child.val()); });
    renderProjects('publicProjectList', list);
});

// (나머지 로직들은 이전과 동일)
</script>
</body>
</html>
