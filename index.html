<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>지존짱짱 - Made by 어쩌다코딩</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fbff; margin: 0; }
        .hidden { display: none !important; }
        
        /* 쫀득한 UI 디자인 유지 */
        .login-card { background: white; padding: 45px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 400px; border: 1px solid #f1f5f9; }
        .input-box { width: 100%; background: #f8fafc; border: 2px solid #f1f5f9; padding: 16px; border-radius: 20px; outline: none; transition: 0.2s; font-weight: 600; margin-bottom: 12px; }
        .input-box:focus { border-color: #3b82f6; background: white; }
        
        .nav-btn { font-weight: 700; color: #475569; display: flex; align-items: center; gap: 6px; }
        .active-pill { background-color: #4f46e5; color: white !important; padding: 6px 18px; border-radius: 999px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

<nav id="topNav" class="bg-white border-b px-10 py-4 flex justify-between items-center hidden sticky top-0 z-50">
    <div class="flex items-center gap-2"><span class="text-2xl font-black text-blue-600 italic">지존짱짱 🚀</span></div>
    <div class="flex items-center gap-8 font-bold">
        <div class="flex gap-8 items-center">
            <button class="nav-btn">🏠 홈</button>
            <button class="nav-btn">📂 마이페이지</button>
            <button class="nav-btn active-pill">💬 이야기</button>
        </div>
        <div class="h-6 w-[1px] bg-slate-200 mx-2"></div>
        <div class="flex items-center gap-3">
            <span id="adminTag" class="hidden text-[10px] bg-yellow-400 px-2 py-0.5 rounded font-black shadow-sm">운영자</span>
            <span class="text-sm font-bold text-slate-600"><span id="nickDisplay" class="text-blue-600"></span>님</span>
            <button onclick="handleLogout()" class="text-xs text-slate-400 font-bold hover:text-red-500 underline">로그아웃</button>
        </div>
    </div>
</nav>

<div id="authContainer" class="flex-grow flex items-center justify-center">
    <div class="login-card text-center relative">
        <h2 class="text-3xl font-black mb-1 text-slate-800 tracking-tight">지존짱짱 👋</h2>
        <p class="text-[10px] text-blue-400 font-black mb-8 tracking-widest uppercase">Made by 어쩌다코딩</p>
        
        <div id="loginArea">
            <input id="loginId" type="text" placeholder="아이디" class="input-box">
            <input id="loginPw" type="password" placeholder="비밀번호" class="input-box">
            <button onclick="authAction('login')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg mb-4 hover:scale-[1.02] active:scale-95 transition-all">로그인</button>
            <button onclick="toggleView(true)" class="text-slate-400 font-bold text-sm hover:text-blue-500 underline decoration-2">처음이신가요? 회원가입</button>
        </div>

        <div id="signupArea" class="hidden">
            <input id="regId" type="text" placeholder="아이디 정하기" class="input-box">
            <input id="regNick" type="text" placeholder="닉네임 정하기" class="input-box">
            <input id="regPw" type="password" placeholder="비밀번호 (6자 이상)" class="input-box">
            <button onclick="authAction('signup')" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black text-lg shadow-lg mb-4 hover:scale-[1.02] active:scale-95 transition-all">가입 완료</button>
            <button onclick="toggleView(false)" class="text-slate-400 font-bold text-sm hover:text-blue-500 underline decoration-2">이미 계정이 있어요</button>
        </div>
    </div>
</div>

<div id="mainContent" class="hidden p-20 text-center flex-grow">
    <h1 class="text-5xl font-black text-slate-800 mb-6">로그인 성공! 🎉</h1>
    <p class="text-slate-400 font-bold text-xl mb-10">상단 메뉴에서 다른 친구들과 이야기를 나눠보세요.</p>
</div>

<script>
// Firebase 설정 (기존 값 유지)
const firebaseConfig = {
  apiKey: "AIzaSyDdFsRGy_2mZowYinOf9LeQhot08xyaqc4",
  authDomain: "zizon-coding.firebaseapp.com",
  projectId: "zizon-coding",
  storageBucket: "zizon-coding.firebasestorage.app",
  messagingSenderId: "146850583672",
  appId: "1:146850583672:web:243e71867880c00ffdc98d",
  databaseURL: "https://zizon-coding-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// 화면 전환 함수
function toggleView(isSignup) {
    document.getElementById('loginArea').classList.toggle('hidden', isSignup);
    document.getElementById('signupArea').classList.toggle('hidden', !isSignup);
}

// 🛠️ 강력하게 수리된 인증 함수
async function authAction(type) {
    if (type === 'signup') {
        const id = document.getElementById('regId').value.trim();
        const nick = document.getElementById('regNick').value.trim();
        const pw = document.getElementById('regPw').value.trim();

        if(!id || !nick || !pw) return alert("모든 빈칸을 채워줘!");
        if(pw.length < 6) return alert("비밀번호는 6자 이상이어야 해!");

        try {
            // 닉네임 중복 체크 먼저 실행
            const nickCheck = await db.ref('users').orderByChild('nickname').equalTo(nick).once('value');
            if(nickCheck.exists()) return alert("이미 누군가 사용 중인 닉네임이야!");

            // 회원가입 실행
            const res = await auth.createUserWithEmailAndPassword(id + "@zizon.com", pw);
            // 데이터베이스에 정보 저장
            await db.ref('users/' + res.user.uid).set({
                id: id,
                nickname: nick
            });
            
            // 요청하신 성공 메시지 추가!
            alert("회원 가입 성공!"); 
            location.reload();
        } catch (err) {
            alert("가입 실패: " + err.message);
        }
    } else {
        const id = document.getElementById('loginId').value.trim();
        const pw = document.getElementById('loginPw').value.trim();
        
        if(!id || !pw) return alert("아이디와 비밀번호를 입력해줘!");

        auth.signInWithEmailAndPassword(id + "@zizon.com", pw)
            .catch(err => alert("아이디나 비밀번호가 틀렸어!"));
    }
}

function handleLogout() { auth.signOut().then(() => location.reload()); }

// 로그인 상태 감지 및 UI 자동 전환
auth.onAuthStateChanged(async user => {
    if (user) {
        const snap = await db.ref('users/' + user.uid).once('value');
        const userData = snap.val();
        if (userData) {
            document.getElementById('authContainer').classList.add('hidden');
            document.getElementById('topNav').classList.remove('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('nickDisplay').innerText = userData.nickname;
            
            // 어쩌다코딩 운영자 태그 설정
            if(userData.id === "somehowcoding" || userData.id === "어쩌다코딩") {
                document.getElementById('adminTag').classList.remove('hidden');
            }
        }
    }
});
</script>
</body>
</html>
